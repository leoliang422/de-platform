# Render 蓝图（Infrastructure as Code）。
# 在 Render 控制台 New + → "Blueprint" 选中本仓库即可按此创建后端服务。
# 数据库使用外部 Neon Postgres：部署后在服务的 Environment 里填 DATABASE_URL / CORS_ORIGINS。
services:
  - type: web
    name: de-platform-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: bash start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: production
      # JWT 签名密钥：由 Render 自动生成随机值
      - key: APP_SECRET_KEY
        generateValue: true
      # 以下两个为敏感/环境相关，部署后在控制台手动填写：
      #   DATABASE_URL  = Neon 连接串（postgresql://...?sslmode=require）
      #   CORS_ORIGINS  = 你的 Vercel 前端域名（逗号分隔，可多个）
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # 种子灌入：首次部署用 "1" 建管理员/初始内容；已上线后置 "0"，
      # 避免每次部署重复灌种子、覆盖运营改动、白占数据库容量。
      - key: SEED_ON_START
        value: "0"
      # 注册邮箱验证码：默认关闭（仅账号+密码注册）。
      # 未来接入真实 SMTP 后可置 "true" 启用真正的邮箱验证。
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "false"
      # 大模型：智谱 GLM（OpenAI 兼容）。抽取/补全用 glm-4-flash（免费、快）。
      # API Key 为敏感项，不入仓库：部署后在控制台 Environment 里填 LLM_API_KEY。
      - key: LLM_PROVIDER
        value: zhipu
      - key: LLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: LLM_MODEL
        value: glm-4-flash
      # 多模态模型：图片 OCR 抽字（面经/投稿一键解析图片）。glm-4v-flash 免费可用。
      - key: LLM_VISION_MODEL
        value: glm-4v-flash
      - key: LLM_API_KEY
        sync: false
      - key: PAYMENT_PROVIDER
        value: mock
      # 上传文件（图片）存储：db = 存进数据库（随 Neon 持久化，重部署不丢失）。
      # Render 免费实例磁盘为临时存储，故不用 local；如接了 S3/R2 可改为 s3。
      - key: STORAGE_PROVIDER
        value: db
      # 投稿加工队列：默认关闭（同步加工，无需 Redis）。
      # 开启异步：置为 "true"，填下方 REDIS_URL，并启用下面的 worker 服务。
      - key: TASK_QUEUE_ENABLED
        value: "false"
      # Upstash Redis 连接串（rediss://...）；开启队列时必填，否则留空即可。
      - key: REDIS_URL
        sync: false

  # ────────────────────────────────────────────────────────────────
  # 异步加工 Worker（M5-5B）。默认注释：开启队列时取消注释再 Sync 蓝图。
  # 前置：Upstash 建 Redis 拿到 rediss:// 连接串；web 与 worker 的
  # REDIS_URL 填同一个；两边 TASK_QUEUE_ENABLED=true。Worker 需常驻，
  # 建议随 web 一起升 Starter（免费实例会休眠，不适合跑 worker）。
